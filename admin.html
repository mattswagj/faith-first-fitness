<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#16164a" />
<title>Faith First Fitness — Owner Portal</title>
<link rel="icon" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
  :root{ --navy:#16164a; --orange:#ff6a2b; --ink:#1f2340; --line:#e6e8f2; --bg:#f6f7fb; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  header h1{font-size:1.05rem;margin:0;font-weight:700}
  .muted{color:#8a90ad;font-size:.85rem}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 6px 24px rgba(20,20,60,.05)}
  label{display:block;font-size:.82rem;font-weight:600;margin:10px 0 4px}
  input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:1rem}
  button{cursor:pointer;border:0;border-radius:10px;padding:11px 16px;font-weight:700;font-size:.95rem}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-ghost{background:#eef0f7;color:var(--ink)}
  .btn-sm{padding:7px 11px;font-size:.82rem}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  th{position:sticky;top:0;background:#fff;font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:#6b7192}
  .pill{display:inline-block;background:#eef0f7;border-radius:999px;padding:2px 8px;font-size:.75rem}
  .err{color:#c02626;font-size:.88rem;margin-top:8px}
  .ok{color:#128a3a;font-size:.88rem;margin-top:8px}
  .hide{display:none}
  .tablewrap{max-height:66vh;overflow:auto;border:1px solid var(--line);border-radius:12px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;background:#bbb}
  .dot.live{background:#22c55e}
</style>
</head>
<body>
<header>
  <h1>🏅 Faith First Fitness — Owner Portal</h1>
  <div class="row" id="sessBar"></div>
</header>

<div class="wrap">
  <!-- LOGIN -->
  <div id="loginView" class="card hide" style="max-width:420px;margin:6vh auto">
    <h2 style="margin-top:0">Owner sign in</h2>
    <p class="muted">Private area. Sign in with your owner account to view leads.</p>
    <form id="loginForm" autocomplete="on">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <div style="margin-top:14px"><button class="btn-primary" style="width:100%" type="submit">Sign in</button></div>
      <div id="loginMsg" class="err"></div>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" class="hide">
    <div class="card" style="margin-bottom:16px">
      <div class="row" style="justify-content:space-between">
        <div>
          <strong id="leadCount">Leads</strong>
          <span class="muted" id="lastSync"></span>
          <span class="muted" style="margin-left:8px"><span id="liveDot" class="dot"></span><span id="liveTxt">connecting…</span></span>
        </div>
        <div class="row">
          <button id="notifyBtn" class="btn-ghost btn-sm">🔔 Enable alerts</button>
          <button id="refreshBtn" class="btn-ghost btn-sm">↻ Refresh</button>
          <button id="pwChangeBtn" class="btn-ghost btn-sm">Change password</button>
        </div>
      </div>
      <div id="pwPanel" class="hide" style="margin-top:12px">
        <div class="row" style="align-items:flex-end">
          <div style="flex:1;min-width:220px">
            <label for="newpw">New password (min 10 chars)</label>
            <input id="newpw" type="password" />
          </div>
          <button id="pwSaveBtn" class="btn-primary btn-sm">Update</button>
        </div>
        <div id="pwMsg"></div>
      </div>
    </div>

    <div class="card">
      <div id="leadsMsg" class="muted">Loading leads…</div>
      <div class="tablewrap"><table id="leadsTable" class="hide">
        <thead><tr>
          <th>Received</th><th>Name</th><th>Email</th><th>Phone</th><th>Child age</th><th>Interest</th><th>Message</th>
        </tr></thead>
        <tbody id="leadsBody"></tbody>
      </table></div>
    </div>
  </div>
</div>

<script>
(function(){
  var SUPABASE_URL = 'https://iquwylyezprcejgvmnwd.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_xtsrz6wKWkdRdXvhz9vgAg_EkweEzoG';
  var REF = 'iquwylyezprcejgvmnwd';
  var TOKEN_STORE = 'fff_owner_session';
  // Web Push (VAPID) public key — safe to expose in client. Private key lives only server-side.
  var VAPID_PUBLIC_KEY = 'BMobHXyxdUwtPfXKrNH5XSIklExlidPwd4Q0-fcgQeW2-eY7WEh8ZDdDnRdcddZ8ahf0fFM_MvBlvEfevPE4mqQ';

  var $ = function(id){ return document.getElementById(id); };
  var esc = function(s){ return s==null?'':String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); };
  var fmt = function(t){ try{ return new Date(t).toLocaleString(); }catch(e){ return t; } };

  var session = null;
  var seenIds = {};

  function loadSession(){ try{ session = JSON.parse(localStorage.getItem(TOKEN_STORE)||'null'); }catch(e){ session=null; } }
  function saveSession(s){ session=s; try{ localStorage.setItem(TOKEN_STORE, JSON.stringify(s)); }catch(e){} }
  function clearSession(){ session=null; try{ localStorage.removeItem(TOKEN_STORE); }catch(e){} }

  function authHeaders(){ return { 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+(session?session.access_token:SUPABASE_KEY), 'Content-Type':'application/json' }; }

  function show(view){
    $('loginView').classList.toggle('hide', view!=='login');
    $('dashView').classList.toggle('hide', view!=='dash');
  }

  // ---------- Auth ----------
  $('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    $('loginMsg').textContent='';
    try{
      var res = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password', {
        method:'POST', headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
        body: JSON.stringify({ email:$('email').value.trim(), password:$('password').value })
      });
      var data = await res.json();
      if(!res.ok){ $('loginMsg').textContent = data.error_description || data.msg || 'Sign in failed.'; return; }
      saveSession({ access_token:data.access_token, refresh_token:data.refresh_token, user:data.user });
      boot();
    }catch(err){ $('loginMsg').textContent = 'Network error — please try again.'; }
  });

  function renderSessionBar(){
    var bar = $('sessBar');
    if(session && session.user){
      bar.innerHTML = '<span class="muted">'+esc(session.user.email)+'</span> <button id="logoutBtn" class="btn-ghost btn-sm">Sign out</button>';
      $('logoutBtn').onclick = function(){ closeRealtime(); clearSession(); boot(); };
    } else { bar.innerHTML=''; }
  }

  async function refreshToken(){
    if(!session || !session.refresh_token) return false;
    try{
      var res = await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=refresh_token', {
        method:'POST', headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
        body: JSON.stringify({ refresh_token: session.refresh_token })
      });
      if(!res.ok) return false;
      var data = await res.json();
      saveSession({ access_token:data.access_token, refresh_token:data.refresh_token, user:data.user||session.user });
      return true;
    }catch(e){ return false; }
  }

  // ---------- Leads ----------
  async function loadLeads(isPoll){
    if(!session) return;
    try{
      var res = await fetch(SUPABASE_URL+'/rest/v1/leads?select=*&order=created_at.desc', { headers: authHeaders() });
      if(res.status===401){ var ok = await refreshToken(); if(ok){ return loadLeads(isPoll); } clearSession(); boot(); return; }
      if(!res.ok){ $('leadsMsg').textContent='Could not load leads (HTTP '+res.status+'). Is this account an owner/admin?'; return; }
      var rows = await res.json();
      if(isPoll){ rows.forEach(function(r){ if(!seenIds[r.id]){ notify(r); } }); }
      rows.forEach(function(r){ seenIds[r.id]=true; });
      $('leadsMsg').classList.add('hide');
      $('leadsTable').classList.remove('hide');
      $('leadCount').textContent = rows.length + ' lead' + (rows.length===1?'':'s');
      $('lastSync').textContent = ' · synced ' + new Date().toLocaleTimeString();
      $('leadsBody').innerHTML = rows.map(rowHtml).join('');
    }catch(e){ $('leadsMsg').textContent='Network error loading leads.'; }
  }

  function rowHtml(r){
    return '<tr>'+
      '<td>'+esc(fmt(r.created_at))+'</td>'+
      '<td>'+esc(r.name)+'</td>'+
      '<td>'+(r.email?'<a href="mailto:'+esc(r.email)+'">'+esc(r.email)+'</a>':'')+'</td>'+
      '<td>'+(r.phone?'<a href="tel:'+esc(r.phone)+'">'+esc(r.phone)+'</a>':'')+'</td>'+
      '<td>'+esc(r.child_age)+'</td>'+
      '<td>'+(r.interest?'<span class="pill">'+esc(r.interest)+'</span>':'')+'</td>'+
      '<td>'+esc(r.message)+'</td>'+
    '</tr>';
  }

  function notify(r){
    var title = 'New lead: ' + (r.name || 'Someone');
    var body = [r.interest, r.phone, r.email].filter(Boolean).join(' · ') || 'Open the Owner Portal to view.';
    if('Notification' in window && Notification.permission==='granted'){
      try{ new Notification(title, { body:body, icon:'/icon-192.png', tag:'fff-lead-'+(r.id||Date.now()) }); }catch(e){}
    }
    try{ document.title = '● New lead — Owner Portal'; }catch(e){}
  }

  // ---------- Realtime (raw WebSocket direct to Supabase; no CDN) ----------
  var ws=null, hb=null;
  function setLive(on){ $('liveDot').className='dot'+(on?' live':''); $('liveTxt').textContent = on?'live':'polling'; }
  function openRealtime(){
    try{
      ws = new WebSocket('wss://'+REF+'.supabase.co/realtime/v1/websocket?apikey='+encodeURIComponent(SUPABASE_KEY)+'&vsn=1.0.0');
      ws.onopen = function(){
        ws.send(JSON.stringify({ topic:'realtime:public:leads', event:'phx_join', ref:'1', payload:{
          config:{ postgres_changes:[{ event:'INSERT', schema:'public', table:'leads' }] },
          access_token: session.access_token
        }}));
        hb = setInterval(function(){ if(ws && ws.readyState===1) ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'})); }, 25000);
      };
      ws.onmessage = function(ev){
        var m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
        if(m.event==='phx_reply' && m.ref==='1' && m.payload && m.payload.status==='ok'){ setLive(true); }
        if(m.event==='postgres_changes' && m.payload && m.payload.data && m.payload.data.record){
          var r = m.payload.data.record;
          if(!seenIds[r.id]){ seenIds[r.id]=true; $('leadsBody').insertAdjacentHTML('afterbegin', rowHtml(r)); notify(r); }
        }
      };
      ws.onclose = function(){ setLive(false); clearInterval(hb); if(session){ setTimeout(openRealtime, 4000); } };
      ws.onerror = function(){ try{ ws.close(); }catch(e){} };
    }catch(e){ setLive(false); }
  }
  function closeRealtime(){ try{ if(ws){ ws.onclose=null; ws.close(); } }catch(e){} ws=null; clearInterval(hb); setLive(false); }

  // ---------- Polling fallback (always on) ----------
  var pollTimer=null;
  function startPolling(){ if(pollTimer) return; pollTimer=setInterval(function(){ loadLeads(true); }, 20000); }
  function stopPolling(){ clearInterval(pollTimer); pollTimer=null; }

  // ---------- Background push notifications (VAPID) ----------
  var swReg = null;
  function urlB64ToUint8Array(base64String){
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
    var raw = atob(base64); var arr = new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++){ arr[i]=raw.charCodeAt(i); }
    return arr;
  }
  async function registerSW(){
    if(!('serviceWorker' in navigator)) return null;
    try{ swReg = await navigator.serviceWorker.register('/sw.js'); await navigator.serviceWorker.ready; return swReg; }
    catch(e){ return null; }
  }
  async function saveSubscription(sub){
    var raw = sub.toJSON();
    var body = {
      user_id: session.user.id,
      endpoint: sub.endpoint,
      p256dh: raw.keys && raw.keys.p256dh,
      auth: raw.keys && raw.keys.auth
    };
    var res = await fetch(SUPABASE_URL+'/rest/v1/push_subscriptions?on_conflict=endpoint', {
      method:'POST',
      headers: Object.assign(authHeaders(), { 'Prefer':'resolution=merge-duplicates,return=minimal' }),
      body: JSON.stringify(body)
    });
    return res.ok;
  }
  function setNotifyLabel(txt){ $('notifyBtn').textContent = txt; }
  $('notifyBtn').addEventListener('click', async function(){
    if(!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)){
      alert('This browser/device does not support background notifications. On iPhone, add this page to your Home Screen first (Share → Add to Home Screen), then open it and tap Enable alerts.');
      return;
    }
    setNotifyLabel('… enabling');
    var perm = await Notification.requestPermission();
    if(perm!=='granted'){ setNotifyLabel('🔕 Alerts blocked'); return; }
    if(!swReg){ swReg = await registerSW(); }
    if(!swReg){ setNotifyLabel('🔕 SW error'); alert('Could not register the service worker.'); return; }
    try{
      var sub = await swReg.pushManager.getSubscription();
      if(!sub){
        sub = await swReg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY) });
      }
      var ok = await saveSubscription(sub);
      setNotifyLabel(ok ? '🔔 Alerts on (this device)' : '🔕 Save failed');
      if(!ok){ alert('Subscribed on device, but saving to the server failed. Try again.'); }
    }catch(e){ setNotifyLabel('🔕 Alerts error'); alert('Could not enable background alerts: '+(e&&e.message||e)); }
  });
  $('refreshBtn').addEventListener('click', function(){ loadLeads(false); });

  // ---------- Change password ----------
  $('pwChangeBtn').addEventListener('click', function(){ $('pwPanel').classList.toggle('hide'); });
  $('pwSaveBtn').addEventListener('click', async function(){
    var pw = $('newpw').value; $('pwMsg').className=''; $('pwMsg').textContent='';
    if(!pw || pw.length<10){ $('pwMsg').className='err'; $('pwMsg').textContent='Use at least 10 characters.'; return; }
    try{
      var res = await fetch(SUPABASE_URL+'/auth/v1/user', { method:'PUT', headers:authHeaders(), body:JSON.stringify({password:pw}) });
      if(!res.ok){ var d=await res.json(); $('pwMsg').className='err'; $('pwMsg').textContent=(d.msg||d.error_description||'Update failed.'); return; }
      $('pwMsg').className='ok'; $('pwMsg').textContent='Password updated.'; $('newpw').value='';
    }catch(e){ $('pwMsg').className='err'; $('pwMsg').textContent='Network error.'; }
  });

  // ---------- Boot ----------
  async function boot(){
    renderSessionBar();
    if(!session){ show('login'); closeRealtime(); stopPolling(); return; }
    show('dash');
    await registerSW();
    if('Notification' in window && Notification.permission==='granted' && swReg){
      try{ var s = await swReg.pushManager.getSubscription(); setNotifyLabel(s ? '🔔 Alerts on (this device)' : '🔔 Enable alerts'); }catch(e){}
    }
    await loadLeads(false);
    openRealtime();
    startPolling();
  }

  loadSession();
  boot();
})();
</script>
</body>
</html>
